services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./database:/app/database
      
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000/evaluate_transaction
      - BATCH_BACKEND_URL=http://backend:8000/evaluate_batch
      - BATCH_MAX_WORKERS=3
      - BATCH_ROW_TIMEOUT=180
      - BATCH_ROW_RETRIES=1
    depends_on:
      - backend
